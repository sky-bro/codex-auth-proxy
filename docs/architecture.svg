<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">codex-auth-proxy architecture</title>
  <desc id="desc">An API client calls codex-auth-proxy with the proxy API key. The proxy host reads Codex login state from CODEX_HOME and forwards requests to the remote ChatGPT Codex backend with the Codex access token.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .zone-local { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .zone-remote { fill: #f7fee7; stroke: #84cc16; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .box { stroke-width: 1.5; rx: 10; }
      .client { fill: #eff6ff; stroke: #3b82f6; }
      .proxy { fill: #fff7ed; stroke: #f97316; }
      .store { fill: #f1f5f9; stroke: #64748b; }
      .backend { fill: #ecfccb; stroke: #65a30d; }
      .label { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 650; }
      .small { fill: #334155; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }
      .tiny { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
      .zone-title { fill: #334155; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; font-weight: 700; }
      .center { text-anchor: middle; }
      .arrow-blue { fill: none; stroke: #2563eb; stroke-width: 2.5; marker-end: url(#arrow-blue); }
      .arrow-green { fill: none; stroke: #059669; stroke-width: 2.5; marker-end: url(#arrow-green); }
      .arrow-gray { fill: none; stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow-gray); }
      .return { fill: none; stroke: #2563eb; stroke-width: 2.2; stroke-dasharray: 7 6; marker-end: url(#arrow-blue); }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 8; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="520"/>

  <rect class="zone-local" x="330" y="54" width="306" height="410" rx="18"/>
  <text class="zone-title" x="356" y="86">Proxy host</text>

  <rect class="zone-remote" x="690" y="118" width="238" height="248" rx="18"/>
  <text class="zone-title" x="716" y="150">Remote ChatGPT service</text>

  <rect class="box client" x="76" y="178" width="190" height="86" rx="10"/>
  <text class="label center" x="171" y="216">API client</text>
  <text class="small center" x="171" y="240">local app, remote host, script</text>

  <rect class="box proxy" x="370" y="168" width="220" height="106" rx="10"/>
  <text class="label center" x="480" y="201">codex-auth</text>
  <text class="label center" x="480" y="223">proxy</text>
  <text class="small center" x="480" y="247">localhost API gateway</text>
  <text class="tiny center" x="480" y="264">POST /v1/responses</text>

  <rect class="box store" x="368" y="340" width="224" height="76" rx="10"/>
  <text class="label center" x="480" y="374">Codex home</text>
  <text class="small mono center" x="480" y="397">CODEX_HOME/auth.json</text>

  <rect class="box backend" x="730" y="202" width="158" height="96" rx="10"/>
  <text class="label center" x="809" y="239">Codex</text>
  <text class="label center" x="809" y="263">backend</text>
  <text class="tiny center" x="809" y="282">Responses path</text>

  <path class="arrow-blue" d="M 266 221 L 360 221"/>
  <rect class="note" x="270" y="154" width="94" height="46" rx="8"/>
  <text class="tiny mono center" x="317" y="173">Bearer</text>
  <text class="tiny mono center" x="317" y="190">proxy key</text>

  <path class="arrow-gray" d="M 480 274 L 480 330"/>
  <rect class="note" x="494" y="291" width="112" height="34" rx="8"/>
  <text class="tiny center" x="550" y="313">read login state</text>

  <path class="arrow-green" d="M 590 216 C 646 210 664 250 720 250"/>
  <rect class="note" x="604" y="166" width="134" height="54" rx="8"/>
  <text class="tiny mono center" x="671" y="187">Codex access</text>
  <text class="tiny mono center" x="671" y="205">token + metadata</text>

  <path class="return" d="M 730 278 C 666 330 618 328 590 257"/>
  <rect class="note" x="624" y="310" width="132" height="34" rx="8"/>
  <text class="tiny center" x="690" y="332">SSE stream back</text>

  <path class="return" d="M 370 250 C 326 324 238 318 214 265"/>
  <rect class="note" x="220" y="304" width="140" height="34" rx="8"/>
  <text class="tiny center" x="290" y="326">SSE pass-through</text>

  <rect class="note" x="54" y="388" width="260" height="44" rx="8"/>
  <text class="tiny center" x="184" y="407">Client can be local or remote.</text>
  <text class="tiny center" x="184" y="423">It never sees Codex credentials.</text>

  <rect class="note" x="700" y="390" width="216" height="44" rx="8"/>
  <text class="tiny center" x="808" y="409">Only the proxy talks to</text>
  <text class="tiny center" x="808" y="425">the upstream backend.</text>
</svg>
