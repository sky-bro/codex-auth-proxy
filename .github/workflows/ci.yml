name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: codex-auth-proxy-linux-x86_64
            archive_ext: tar.gz
          - os: macos-14
            artifact_name: codex-auth-proxy-macos-aarch64
            archive_ext: tar.gz
          - os: windows-latest
            artifact_name: codex-auth-proxy-windows-x86_64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libssl-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt --check

      - name: Lint
        if: runner.os == 'Linux'
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        run: |
          mkdir -p "dist/package"
          cp "target/release/codex-auth-proxy" "dist/package/"
          cp README.md LICENSE "dist/package/"
          tar -C "dist/package" -czf "dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}" .

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package
          Copy-Item target/release/codex-auth-proxy.exe dist/package/
          Copy-Item README.md,LICENSE dist/package/
          Compress-Archive -Path dist/package/* -DestinationPath "dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## codex-auth-proxy ${{ github.ref_name }}

          This release provides prebuilt binaries for:

          - Linux x86_64
          - macOS aarch64
          - Windows x86_64

          The archives include the `codex-auth-proxy` binary, `README.md`, and `LICENSE`.

          To publish a release, push a version tag such as `v0.1.0`. Branch pushes and pull
          requests build and test artifacts only; they do not create GitHub Releases.
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: skybro/codex-auth-proxy
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
